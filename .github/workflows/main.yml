name: Advanced IPA Extraction & Reverse Engineering

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'IPA URL'
        required: true
        type: string
        default: 'https://dl.iosvizor.net/resident-evil-4/resident-evil-4-v1.0.5-iosvizor.ipa'
      app_name:
        description: 'অ্যাপ্লিকেশনের নাম'
        required: true
        type: string
        default: 'Assassins-Creed'

jobs:
  extract-and-analyze:
    runs-on: macos-latest

    steps:
    # ১. রিপোজিটরি চেকআউট
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. সমস্ত প্রয়োজনীয় টুলস ইনস্টল করা (Fixed Homebrew Method)
    - name: Install Dependencies
      run: |
        echo "Installing workflow requirements..."
        brew install jq wget
        
        # Natively tapping and installing dsdump on macOS runner
        brew tap derekselander/funpack
        brew install dsdump

    # ৩. IPA ফাইল ডাউনলোড করা
    - name: Download IPA File
      run: |
        user_url="${{ github.event.inputs.ipa_url }}"
        IPA_URL="${user_url:-https://dl.iosvizor.net/resident-evil-4/resident-evil-4-v1.0.5-iosvizor.ipa}"
        
        user_name="${{ github.event.inputs.app_name }}"
        APP_NAME="${user_name:-Resident-Evil-4}"
        
        echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
        
        echo "📥 IPA ডাউনলোড করছি: $IPA_URL"
        curl -L "$IPA_URL" -o "${APP_NAME}.ipa" \
          --progress-bar \
          --max-time 600
        
        if [ ! -f "${APP_NAME}.ipa" ]; then
          echo "❌ ডাউনলোড ব্যর্থ হয়েছে"
          exit 1
        fi
        
        ls -lh "${APP_NAME}.ipa"

    # ৪. IPA কাঠামো বিশ্লেষণ
    - name: Analyze IPA Structure
      run: |
        mkdir -p extracted_source
        cd extracted_source
        
        echo "📦 IPA স্ট্রাকচার বিশ্লেষণ করছি..."
        unzip -l "../${{ env.APP_NAME }}.ipa" > ipa_structure.txt
        
        # IPA এক্সট্রাক্ট করা
        unzip -q "../${{ env.APP_NAME }}.ipa" -d . || true
        
        # .app ফোল্ডার খোঁজা
        APP_PATH=$(find Payload -maxdepth 2 -name "*.app" -type d | head -n 1)
        echo "✅ অ্যাপ পাথ: $APP_PATH"
        echo "$APP_PATH" > app_path.txt
        
        # Payload কাঠামো সংরক্ষণ করা
        find Payload -type f -exec ls -lh {} \; > file_structure.txt

    # ৫. বাইনারি এক্সট্রাকশন এবং বিশ্লেষণ
    - name: Extract Binary Information
      run: |
        cd extracted_source
        APP_PATH=$(cat app_path.txt)
        
        # বাইনারি খোঁজা
        BINARY=$(find "$APP_PATH" -maxdepth 1 -type f ! -name "*.plist" -executable | head -n 1)
        
        if [ -z "$BINARY" ]; then
          BINARY=$(find "$APP_PATH" -maxdepth 1 -type f ! -name "*.plist" ! -name ".*" | head -n 1)
        fi
        
        echo "🔍 বাইনারি পাথ: $BINARY"
        echo "$BINARY" > binary_path.txt
        
        mkdir -p Binary_Analysis
        
        if [ -f "$BINARY" ]; then
          echo "📊 বাইনারি তথ্য সংগ্রহ করছি..."
          
          # বাইনারি তথ্য
          file "$BINARY" > Binary_Analysis/binary_info.txt
          
          # সমস্ত টেক্সট স্ট্রিং এক্সট্রাক্ট করা
          strings "$BINARY" > Binary_Analysis/all_strings.txt
          
          # API এন্ডপয়েন্ট খোঁজা
          strings "$BINARY" | grep -E "https?://|api|\.com|\.net|endpoint" > Binary_Analysis/api_endpoints.txt || true
          
          # ক্লাস এবং মেথড নেম এক্সট্রাক্ট করা (Swift)
          strings "$BINARY" | grep -E "^_ZN|^_T0|Swift" > Binary_Analysis/swift_symbols.txt || true
          
          # Modern Objective-C & Swift class-dumping using natively installed dsdump
          if command -v dsdump &> /dev/null; then
            echo "🔎 dsdump দিয়ে ক্লাস স্ট্রাকচার এক্সট্রাক্ট করছি..."
            dsdump --objc "$BINARY" > Binary_Analysis/objc_classes.txt 2>/dev/null || true
            dsdump --swift "$BINARY" > Binary_Analysis/swift_classes.txt 2>/dev/null || true
          fi
          
          # Native macOS tools
          objdump -d "$BINARY" > Binary_Analysis/objdump_disassembly.txt 2>/dev/null || true
          
          # Native otool mapping
          otool -L "$BINARY" > Binary_Analysis/linked_libraries.txt 2>/dev/null || true
          otool -l "$BINARY" | head -n 50 > Binary_Analysis/load_commands.txt 2>/dev/null || true
        else
          echo "⚠️  বাইনারি খুঁজে পাওয়া যায়নি"
        fi

    #6. অ্যাসেটস এবং রিসোর্স এক্সট্রাকশন
    - name: Extract Assets and Resources
      run: |
        cd extracted_source
        APP_PATH=$(cat app_path.txt)
        
        echo "📁 অ্যাসেটস এক্সট্রাক্ট করছি..."
        mkdir -p Assets_Resources
        
        find "$APP_PATH" -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.webp" \) \
          -exec cp {} Assets_Resources/ \; 2>/dev/null || true
        
        find "$APP_PATH" -type f \( -name "*.plist" -o -name "*.json" -o -name "*.xml" -o -name "*.strings" \) \
          -exec cp {} Assets_Resources/ \; 2>/dev/null || true
        
        if [ -f "$APP_PATH/Info.plist" ]; then
          echo "📋 Info.plist পার্স করছি..."
          plutil -p "$APP_PATH/Info.plist" > Assets_Resources/Info_plist_parsed.txt 2>/dev/null || \
          cat "$APP_PATH/Info.plist" > Assets_Resources/Info_plist_raw.txt
        fi
        
        find "$APP_PATH" -type f \( -name "*.ttf" -o -name "*.otf" \) \
          -exec cp {} Assets_Resources/ \; 2>/dev/null || true

    # ৭. ডায়নামিক লিঙ্কিং তথ্য
    - name: Extract Dynamic Linking Info
      run: |
        cd extracted_source
        mkdir -p Dynamic_Info
        BINARY=$(cat binary_path.txt)
        
        if [ -f "$BINARY" ]; then
          nm "$BINARY" > Dynamic_Info/all_symbols.txt 2>/dev/null || true
          nm -g "$BINARY" > Dynamic_Info/dynamic_symbols.txt 2>/dev/null || true
        fi

    # ৮. নিরাপত্তা বিশ্লেষণ
    - name: Security Analysis
      run: |
        cd extracted_source
        mkdir -p Security_Analysis
        BINARY=$(cat binary_path.txt)
        
        if [ -f "$BINARY" ]; then
          otool -hv "$BINARY" > Security_Analysis/binary_headers.txt 2>/dev/null || true
          otool -l "$BINARY" | grep -A5 "LC_ENCRYPTION" > Security_Analysis/encryption_info.txt 2>/dev/null || true
          otool -l "$BINARY" | grep -A10 "LC_CODE_SIGNATURE" > Security_Analysis/code_signature.txt 2>/dev/null || true
        fi

    # ৯. রিপোর্ট জেনারেশন
    - name: Generate Analysis Report
      run: |
        cd extracted_source
        
        cat > ANALYSIS_REPORT.md << 'EOF'
        # iOS IPA বিশ্লেষণ রিপোর্ট
        
        ## অ্যাপ্লিকেশন তথ্য
        EOF
        
        echo "**অ্যাপ নাম:** ${{ env.APP_NAME }}" >> ANALYSIS_REPORT.md
        echo "**বিশ্লেষণ তারিখ:** $(date)" >> ANALYSIS_REPORT.md
        echo "" >> ANALYSIS_REPORT.md
        
        echo "## বাইনারি তথ্য" >> ANALYSIS_REPORT.md
        if [ -f "Binary_Analysis/binary_info.txt" ]; then
          echo '```' >> ANALYSIS_REPORT.md
          cat "Binary_Analysis/binary_info.txt" >> ANALYSIS_REPORT.md
          echo '```' >> ANALYSIS_REPORT.md
        fi
        
        echo "" >> ANALYSIS_REPORT.md
        echo "## সনাক্ত করা API এন্ডপয়েন্ট" >> ANALYSIS_REPORT.md
        if [ -f "Binary_Analysis/api_endpoints.txt" ]; then
          echo '```' >> ANALYSIS_REPORT.md
          head -n 50 "Binary_Analysis/api_endpoints.txt" >> ANALYSIS_REPORT.md
          echo '```' >> ANALYSIS_REPORT.md
        fi
        
        echo "" >> ANALYSIS_REPORT.md
        echo "## স্ট্রিং বিশ্লেষণ" >> ANALYSIS_REPORT.md
        echo "মোট স্ট্রিং: $(wc -l < Binary_Analysis/all_strings.txt)" >> ANALYSIS_REPORT.md

    # ১০. সমস্ত ডেটা জিপ করা
    - name: Package All Data
      run: |
        cd extracted_source
        zip -r ../binary_analysis.zip Binary_Analysis/ -q
        zip -r ../assets_resources.zip Assets_Resources/ -q
        zip -r ../dynamic_info.zip Dynamic_Info/ -q
        zip -r ../security_analysis.zip Security_Analysis/ -q
        zip -r ../full_extraction.zip . -q
        
        cp ANALYSIS_REPORT.md ../
        cd ..

    # ১১. GitHub Artifacts এ আপলোড করা
    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: IPA-Analysis-Complete-${{ env.APP_NAME }}
        path: |
          binary_analysis.zip
          assets_resources.zip
          dynamic_info.zip
          security_analysis.zip
          ANALYSIS_REPORT.md
        retention-days: 14
        compression-level: 9

    # ১২. সারসংক্ষেপ তৈরি করা
    - name: Create Summary
      if: always()
      run: |
        cat > summary.txt << EOF
        ✅ iOS IPA বিশ্লেষণ সম্পন্ন হয়েছে
        📥 ডাউনলোড করুন: Artifacts থেকে
        EOF
        cat summary.txt
